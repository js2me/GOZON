name: Build and Deploy SSR Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate build
        run: pnpm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          PORT="${{ vars.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          PORT="${{ vars.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            echo "Repository variable DEPLOY_PATH is required"
            exit 1
          fi

          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            -e "ssh -p $PORT" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$DEPLOY_PATH/"

      - name: Install dependencies and restart app
        run: |
          PORT="${{ vars.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            echo "Repository variable DEPLOY_PATH is required"
            exit 1
          fi

          PM2_APP_NAME="${{ vars.DEPLOY_PM2_APP_NAME }}"
          if [ -z "$PM2_APP_NAME" ]; then PM2_APP_NAME="gozon"; fi

          ssh -p "$PORT" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -e
            cd '$DEPLOY_PATH'
            corepack enable
            pnpm install --frozen-lockfile
            PM2_APP_NAME='$PM2_APP_NAME' pm2 reload ecosystem.config.cjs --only '$PM2_APP_NAME' --update-env || PM2_APP_NAME='$PM2_APP_NAME' pm2 start ecosystem.config.cjs --only '$PM2_APP_NAME'
            pm2 save
          "
